services:
  postgres:
    image: postgres:16-alpine
    container_name: document-nest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-document_nest}
      POSTGRES_USER: ${DB_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-root} -d ${DB_DATABASE:-document_nest}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: document-nest-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
      image: mongo:7
      container_name: document-nest-mongodb
      restart: unless-stopped
      ports:
          - '${MONGODB_PORT:-27017}:27017'
      volumes:
          - mongodb_data:/data/db
      healthcheck:
          test: [ 'CMD', 'mongosh', '--quiet', '--eval', "db.runCommand({ ping: 1 }).ok" ]
          interval: 10s
          timeout: 5s
          retries: 5

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
